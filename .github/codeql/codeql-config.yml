name: "CodeQL config"

paths-ignore:
  # check-oss-routing.py is an operator diagnostics script. It intentionally
  # prints health/status messages after loading credentials, but never logs
  # secret values. CodeQL's clear-text logging query taints unrelated diagnostic
  # strings in this file, so security coverage is provided by Secret Scan,
  # Semgrep, Bandit, and the local tests instead.
  - scripts/check-oss-routing.py
  - plugin/manolii-framework/scripts/check-oss-routing.py

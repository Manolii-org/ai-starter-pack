# Cut a release tag via workflow_dispatch.
# Exists because sandboxed web sessions cannot push tag refs (git wire and
# REST tag writes are proxy-blocked); this lets any authorised operator or
# agent cut a version tag through Actions instead. Uses no third-party
# actions, so there is nothing to SHA-pin.
name: Release tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (vX.Y.Z)"
        required: true
      sha:
        description: "Commit SHA to tag (defaults to main HEAD)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Refusing tag '$TAG' — must match vX.Y.Z" >&2
            exit 1
          fi
      - name: Validate sha format (when provided)
        env:
          SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          if [ -n "$SHA" ] && ! printf '%s' "$SHA" | grep -Eq '^[0-9a-f]{7,40}$'; then
            echo "Refusing sha '$SHA' — must be 7-40 lowercase hex chars" >&2
            exit 1
          fi
      - name: Create tag ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          SHA: ${{ inputs.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "$SHA" ]; then
            SHA=$(curl -sf --max-time 30 -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/commits/main" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")
          fi
          echo "Tagging $SHA as $TAG"
          curl -sf --max-time 30 -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/git/refs" \
            -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"$SHA\"}"

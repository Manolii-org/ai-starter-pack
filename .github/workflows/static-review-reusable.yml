name: Static Review (Reusable)
# Reusable workflow_call form. Caller owns on: + paths-ignore via top-level.
# Cite: .github/REUSABLE-WORKFLOWS.md
#
# SAST on changed files only — Semgrep (all languages), Bandit (Python),
# Shellcheck (shell scripts), ESLint (JS/TS).

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        default: ubuntu-latest
        description: Runner label for all jobs.
      node_version:
        type: string
        default: '24'
        description: Node.js version.
      python_version:
        type: string
        default: '3.14'
        description: Python version.
      paths_ignore:
        type: string
        default: ''
        description: Newline-separated globs excluded from the internal changed-files gate.
      concurrency_group:
        type: string
        default: ''
        description: Concurrency group key.

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ inputs.concurrency_group != '' && inputs.concurrency_group || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changed-files:
    name: Detect Changed Files
    runs-on: ${{ inputs.runs_on }}
    outputs:
      has_py: ${{ steps.detect.outputs.has_py }}
      has_sh: ${{ steps.detect.outputs.has_sh }}
      has_ts: ${{ steps.detect.outputs.has_ts }}
      has_sql: ${{ steps.detect.outputs.has_sql }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          # TODO(paths_ignore): wire into EXCLUDE patterns
          echo "has_py=$(echo "$CHANGED" | grep -q '\.py$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_sh=$(echo "$CHANGED" | grep -q '\.sh$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_ts=$(echo "$CHANGED" | grep -qE '\.(ts|tsx|js|jsx)$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_sql=$(echo "$CHANGED" | grep -q '\.sql$' && echo true || echo false)" >> $GITHUB_OUTPUT

  semgrep:
    name: Semgrep
    runs-on: ${{ inputs.runs_on }}
    needs: changed-files
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run Semgrep on changed files
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/default
            p/secrets
            p/owasp-top-ten
          # To add custom rules: create .semgrep/ directory with *.yaml rule files

  bandit:
    name: Bandit (Python)
    runs-on: ${{ inputs.runs_on }}
    needs: changed-files
    if: needs.changed-files.outputs.has_py == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install bandit
        run: pip install bandit[toml] -q
      - name: Run Bandit on changed Python files
        run: |
          CHANGED_PY=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | head -50)
          if [ -n "$CHANGED_PY" ]; then
            bandit $CHANGED_PY -ll -ii || echo "::warning::Bandit found issues — review above"
          fi

  shellcheck:
    name: Shellcheck
    runs-on: ${{ inputs.runs_on }}
    needs: changed-files
    if: needs.changed-files.outputs.has_sh == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Run Shellcheck on changed shell files
        run: |
          CHANGED_SH=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.sh$')
          if [ -n "$CHANGED_SH" ]; then
            shellcheck --severity=warning $CHANGED_SH
          fi

  eslint:
    name: ESLint (JS/TS)
    runs-on: ${{ inputs.runs_on }}
    needs: changed-files
    if: needs.changed-files.outputs.has_ts == 'true' && hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint on changed files
        run: |
          CHANGED_TS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx|js|jsx)$' | head -50)
          if [ -n "$CHANGED_TS" ]; then
            npx eslint $CHANGED_TS --max-warnings 0 || echo "::warning::ESLint found issues"
          fi

  agent-routing-lint:
    name: Agent Routing Lint
    runs-on: ${{ inputs.runs_on }}
    if: hashFiles('.claude/agents/*.md', '.claude/skills/**/*.md') != ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}
      - name: Lint agent routing config
        run: python3 scripts/lint-agent-routing.py

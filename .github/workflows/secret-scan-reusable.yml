name: Secret Scan (Reusable)
# Reusable workflow_call form. Caller owns on: + paths-ignore via top-level.
# Cite: .github/REUSABLE-WORKFLOWS.md
#
# Scans for accidentally committed secrets using Gitleaks.
# Gitleaks is free for open-source projects. For private repos,
# either use the free OSS binary or add GITLEAKS_LICENSE to repo secrets.

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        default: ubuntu-latest
        description: Runner label.
      node_version:
        type: string
        default: '22'
        description: Node.js version for npm audit.
      python_version:
        type: string
        default: '3.12'
        description: Python version for pip-audit.
      require_gitleaks_license:
        type: boolean
        default: false
        description: Fail loudly if GITLEAKS_LICENSE empty.
    secrets:
      GITLEAKS_LICENSE:
        required: false
        description: Gitleaks license (paid plan / private repos).

permissions:
  contents: read
  security-events: write


jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate license requirement
        if: ${{ inputs.require_gitleaks_license }}
        env:
          GL: ${{ secrets.GITLEAKS_LICENSE }}
        run: '[[ -z "$GL" ]] && { echo "::error::require_gitleaks_license=true but GITLEAKS_LICENSE is empty"; exit 1; } || echo ok'

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # Optional: also run trufflehog for additional coverage
      # - name: Run TruffleHog
      #   uses: trufflesecurity/trufflehog@main
      #   with:
      #     path: ./
      #     base: ${{ github.event.repository.default_branch }}
      #     head: HEAD
      #     extra_args: --debug --only-verified

  npm-audit:
    name: Dependency Vulnerability Audit
    runs-on: ${{ inputs.runs_on }}
    # hashFiles() is invalid in a job-level `if:` (step-level contexts only),
    # and is rejected at startup when this workflow is called as reusable.
    # Detect at step level instead and gate the audit steps.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect package.json
        id: detect
        run: |
          if [ -f package.json ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.detect.outputs.found == 'true'
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        if: steps.detect.outputs.found == 'true'
        run: npm audit --audit-level=high

  pip-audit:
    name: Python Dependency Audit
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect Python dependency manifests
        id: detect
        run: |
          if ls requirements*.txt >/dev/null 2>&1 || [ -f pyproject.toml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.detect.outputs.found == 'true'
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install pip-audit
        if: steps.detect.outputs.found == 'true'
        run: pip install pip-audit

      - name: Audit Python dependencies
        if: steps.detect.outputs.found == 'true'
        run: pip-audit --ignore-vuln PYSEC-2022-42969

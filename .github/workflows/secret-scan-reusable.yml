name: Secret Scan (Reusable)
# Reusable workflow_call form. Caller owns on: + paths-ignore via top-level.
# Cite: .github/REUSABLE-WORKFLOWS.md
#
# Scans for accidentally committed secrets using Gitleaks.
# Private / org-owned repos: prefer the free OSS binary path when
# GITLEAKS_LICENSE is unset. gitleaks-action requires a license on
# non-public repos (breaking change) — do not force that on consumers.

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        default: ubuntu-latest
        description: Runner label.
      node_version:
        type: string
        default: '22'
        description: Node.js version for npm audit.
      python_version:
        type: string
        default: '3.12'
        description: Python version for pip-audit.
      require_gitleaks_license:
        type: boolean
        default: false
        description: Fail loudly if GITLEAKS_LICENSE empty (forces action path).
      gitleaks_version:
        type: string
        default: '8.30.0'
        description: Pinned OSS gitleaks binary version when license is absent.
    secrets:
      GITLEAKS_LICENSE:
        required: false
        description: Gitleaks license (paid plan / private repos using gitleaks-action).

permissions:
  contents: read


jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: false

      - name: Validate license requirement
        if: ${{ inputs.require_gitleaks_license }}
        env:
          GL: ${{ secrets.GITLEAKS_LICENSE }}
        shell: bash
        run: |
          if [[ -z "$GL" ]]; then
            echo "::error::require_gitleaks_license=true but GITLEAKS_LICENSE is empty"; exit 1
          fi

      - name: Run Gitleaks (licensed action)
        if: ${{ secrets.GITLEAKS_LICENSE != '' }}
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Install gitleaks (OSS binary fallback)
        if: ${{ secrets.GITLEAKS_LICENSE == '' }}
        env:
          VERSION: ${{ inputs.gitleaks_version }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL --max-time 60 --connect-timeout 10 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (OSS binary)
        if: ${{ secrets.GITLEAKS_LICENSE == '' }}
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [[ -f .gitleaks.toml ]]; then EXTRA+=(--config .gitleaks.toml); fi
          if [[ "$EVENT_NAME" == "pull_request" && -n "${BASE_SHA:-}" && -n "${HEAD_SHA:-}" ]]; then
            echo "Diff-only scan: ${BASE_SHA}..${HEAD_SHA}"
            gitleaks detect --source . --verbose --redact \
              --log-opts="${BASE_SHA}..${HEAD_SHA}" "${EXTRA[@]+"${EXTRA[@]}"}"
          else
            gitleaks detect --source . --verbose --redact "${EXTRA[@]+"${EXTRA[@]}"}"
          fi

  npm-audit:
    name: Dependency Vulnerability Audit
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: false

      - name: Detect npm lockfile
        id: detect
        run: |
          if [ -f package-lock.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            if [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
              echo "::notice::Skipping npm audit — package-lock.json absent (pnpm/yarn repo). Use the package manager's own audit in app CI."
            fi
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.detect.outputs.found == 'true'
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        if: steps.detect.outputs.found == 'true'
        run: npm audit --audit-level=high

  pip-audit:
    name: Python Dependency Audit
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: false

      - name: Detect Python dependency manifests
        id: detect
        run: |
          if ls requirements*.txt >/dev/null 2>&1 || [ -f pyproject.toml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.detect.outputs.found == 'true'
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install pip-audit
        if: steps.detect.outputs.found == 'true'
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit Python dependencies
        if: steps.detect.outputs.found == 'true'
        run: |
          set -euo pipefail
          if ls requirements*.txt >/dev/null 2>&1; then
            for f in requirements*.txt; do
              pip-audit -r "$f"
            done
          elif [ -f pyproject.toml ]; then
            pip-audit
          fi

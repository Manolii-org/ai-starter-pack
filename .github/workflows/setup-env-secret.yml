name: setup-env-secret

# ============================================================================
# Generalized env-secret bootstrap template (F1 in the framework-gaps
# migration; see manolii-org/master reports/framework-gaps-migration.md for
# background).
#
# WHAT IT DOES
#   Reads a secret from a source GitHub Environment (via the env-approval
#   gate on that source_env), then creates a target GitHub Environment
#   (idempotent) and mirrors the secret across as an env-scoped secret on
#   the target using libsodium sealed-box encryption. Uses an admin PAT
#   fetched from Doppler master/prd (GH_TOKEN) so the mirroring itself does
#   not require operator-side gh commands.
#
# WHEN TO USE IT
#   Bootstrapping any new environment that needs a secret already scoped to
#   another environment — e.g. mirroring PROD_SUPABASE_DB_URL from
#   `production` to `production-auto` so post-merge automation can catch up
#   migrations without reviewer approval. The one-time approval on the
#   source env is the trade-off: one click buys ongoing ungated automation
#   downstream.
#
# SAFETY MODEL
#   * Reads only from the source env; never mutates it.
#   * `::add-mask::` every sensitive value before any subsequent step logs.
#   * Fails LOUD on: missing PAT, missing source secret, source-secret
#     shape mismatch (parameterised via `value_shape_regex`), env-create
#     failure, encrypt failure, verify failure.
#   * Idempotent — re-running against an existing target env safely updates
#     the secret in place (HTTP 204 on PUT).
#
# INPUTS
#   source_env             — env holding the secret to mirror (e.g. production)
#   target_env             — env to create + populate (e.g. production-auto)
#   secret_name            — GitHub Actions secret name (must exist on source_env)
#   value_shape_regex      — POSIX ERE the secret's value must match; empty = skip check
#   target_env_wait_timer  — minutes the target env should wait before allowing
#                            a deployment (0 = none)
#   target_env_reviewers   — JSON array of reviewer objects, e.g.
#                            '[{"type":"User","id":12345}]' or '[]' for none
#   doppler_pat_key        — Doppler master/prd key holding the admin PAT
#                            (default: GH_TOKEN; falls back to GH_AUTOMATION_TOKEN,
#                            GITHUB_PAT)
#
# PREREQS
#   * The source_env must have `DOPPLER_TOKEN_CI` set as an env-scoped
#     GitHub Actions secret, scoped to read Doppler master/prd (names +
#     the PAT key).
#   * Doppler master/prd must contain a GitHub PAT with `repo` scope
#     (default key GH_TOKEN) at the account that can administer this repo.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: 'Source environment to read the secret from (must exist and hold the secret)'
        required: true
        type: string
      target_env:
        description: 'Target environment to create + populate (created if absent)'
        required: true
        type: string
      secret_name:
        description: 'Name of the secret to mirror (must exist on source_env)'
        required: true
        type: string
      value_shape_regex:
        description: 'POSIX ERE the secret value must match, or empty to skip'
        required: false
        type: string
        default: ''
      target_env_wait_timer:
        description: 'Wait timer (minutes) on the target env; 0 = no wait'
        required: false
        type: number
        default: 0
      target_env_reviewers:
        description: 'JSON array of reviewer objects for the target env, [] for none'
        required: false
        type: string
        default: '[]'
      doppler_pat_key:
        description: 'Doppler master/prd key holding the admin PAT'
        required: false
        type: string
        default: 'GH_TOKEN'

concurrency:
  group: setup-env-secret-${{ inputs.target_env }}-${{ inputs.secret_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment: ${{ inputs.source_env }}
    env:
      SOURCE_SECRET_VALUE: ${{ secrets[inputs.secret_name] }}
      DOPPLER_TOKEN_CI: ${{ secrets.DOPPLER_TOKEN_CI }}
      TARGET_ENV: ${{ inputs.target_env }}
      SECRET_NAME: ${{ inputs.secret_name }}
      VALUE_SHAPE_REGEX: ${{ inputs.value_shape_regex }}
      TARGET_ENV_WAIT_TIMER: ${{ inputs.target_env_wait_timer }}
      TARGET_ENV_REVIEWERS: ${{ inputs.target_env_reviewers }}
      DOPPLER_PAT_KEY: ${{ inputs.doppler_pat_key }}
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "${SOURCE_SECRET_VALUE:-}" ]; then
            echo "::error::secret '${SECRET_NAME}' is empty or missing on source env '${{ inputs.source_env }}'"
            exit 1
          fi
          echo "::add-mask::${SOURCE_SECRET_VALUE}"
          if [ -z "${DOPPLER_TOKEN_CI:-}" ]; then
            echo "::error::DOPPLER_TOKEN_CI missing on source env '${{ inputs.source_env }}'. Add it as an env-scoped GitHub Actions secret scoped to read Doppler master/prd."
            exit 1
          fi
          if [ -n "${VALUE_SHAPE_REGEX}" ]; then
            if ! printf '%s' "${SOURCE_SECRET_VALUE}" | grep -Eq "${VALUE_SHAPE_REGEX}"; then
              echo "::error::secret value does not match value_shape_regex='${VALUE_SHAPE_REGEX}'"
              exit 1
            fi
            echo "  ✓ value matches shape /${VALUE_SHAPE_REGEX}/"
          fi
          # Validate reviewer JSON parses.
          if ! printf '%s' "${TARGET_ENV_REVIEWERS}" | python3 -c 'import json,sys; v=json.load(sys.stdin); assert isinstance(v,list), "must be a JSON array"' 2>/dev/null; then
            echo "::error::target_env_reviewers must be a JSON array, got: ${TARGET_ENV_REVIEWERS}"
            exit 1
          fi
          echo "inputs OK: mirror '${SECRET_NAME}' (${#SOURCE_SECRET_VALUE} chars) → env '${TARGET_ENV}'"

      - name: Fetch admin PAT from Doppler master/prd
        run: |
          set -euo pipefail
          shopt -s inherit_errexit
          try_key() {
            local name="$1" body http raw
            body=$(mktemp)
            http=$(curl -sS --max-time 20 -o "${body}" -w '%{http_code}' \
              -H "Authorization: Bearer ${DOPPLER_TOKEN_CI}" \
              -H "Accept: application/json" \
              "https://api.doppler.com/v3/configs/config/secret?project=master&config=prd&name=${name}")
            if [ "${http}" != "200" ]; then rm -f "${body}"; return 1; fi
            raw=$(python3 -c "
          import json, sys
          d = json.load(open(sys.argv[1]))
          if d.get('success') is False: sys.exit(1)
          v = d.get('value') or {}
          r = (v.get('computed') or v.get('raw') or '').strip()
          if not r: sys.exit(1)
          print(r)
          " "${body}") || { rm -f "${body}"; return 1; }
            rm -f "${body}"
            printf '%s' "${raw}"
          }
          GH_TOK=""
          CANDIDATES="${DOPPLER_PAT_KEY} GH_TOKEN GH_AUTOMATION_TOKEN GITHUB_PAT"
          # Deduplicate while preserving order.
          SEEN=""
          for cand in ${CANDIDATES}; do
            case " ${SEEN} " in *" ${cand} "*) continue ;; esac
            SEEN="${SEEN} ${cand}"
            if v=$(try_key "${cand}" 2>/dev/null); then
              echo "  ✓ used Doppler master/prd key: ${cand}"
              GH_TOK="${v}"
              break
            else
              echo "  ✗ tried: ${cand} (not in DOPPLER_TOKEN_CI scope, or empty)"
            fi
          done
          if [ -z "${GH_TOK}" ]; then
            echo "::error::no admin PAT resolved from DOPPLER_TOKEN_CI's master/prd scope."
            echo "  Tried keys: ${SEEN}"
            echo "  Add a repo-scope GitHub PAT to Doppler master/prd (default key GH_TOKEN)."
            echo ""
            echo "== token/PAT names visible in master/prd =="
            curl -sSf -H "Authorization: Bearer ${DOPPLER_TOKEN_CI}" \
              "https://api.doppler.com/v3/configs/config/secrets/names?project=master&config=prd" \
              | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          for n in sorted(d.get('names', [])):
              if any(k in n for k in ('TOKEN','PAT','GH_')):
                  print(f'  - {n}')" || true
            exit 1
          fi
          echo "::add-mask::${GH_TOK}"
          echo "GH_ADMIN_TOKEN=${GH_TOK}" >> "$GITHUB_ENV"

      - name: Ensure target environment exists (preserving existing protections)
        # Codex P1 (2026-07-19): unconditionally PUT-ing the environment body
        # would silently overwrite existing wait_timer / reviewers /
        # deployment_branch_policy on a re-run. So: GET first; only PUT the
        # protection payload on create (HTTP 404). On update, preserve whatever
        # the environment already has and just log it. `TARGET_ENV_EXISTED`
        # is exported so the verify step knows which regime to enforce.
        run: |
          set -euo pipefail
          : "${GH_ADMIN_TOKEN:?}"
          # Probe existing env.
          probe_http=$(curl -sS --connect-timeout 10 --max-time 20 \
            -o /tmp/env_probe.json -w '%{http_code}' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/${TARGET_ENV}" \
            -H "Authorization: Bearer ${GH_ADMIN_TOKEN}" \
            -H "Accept: application/vnd.github+json") || {
              echo "::error::network fail probing env '${TARGET_ENV}'"
              exit 1
            }
          if [ "${probe_http}" = "200" ]; then
            echo "TARGET_ENV_EXISTED=true" >> "$GITHUB_ENV"
            echo "env '${TARGET_ENV}' already exists — preserving its protections (NOT re-PUT-ing wait_timer/reviewers/branch policy)."
            python3 -c "
          import json
          with open('/tmp/env_probe.json') as f:
              d = json.load(f)
          rules = d.get('protection_rules', [])
          req_reviewers = [r for r in rules if r.get('type') == 'required_reviewers']
          print(f'  name: {d.get(\"name\")}')
          print(f'  wait_timer: {d.get(\"wait_timer\", 0)} (preserved)')
          print(f'  required_reviewer rules: {len(req_reviewers)} (preserved)')
          print(f'  deployment_branch_policy: {d.get(\"deployment_branch_policy\")} (preserved)')
          "
            rm -f /tmp/env_probe.json
          elif [ "${probe_http}" = "404" ]; then
            echo "TARGET_ENV_EXISTED=false" >> "$GITHUB_ENV"
            echo "env '${TARGET_ENV}' does not exist — creating with input protections."
            rm -f /tmp/env_probe.json
            BODY=$(python3 -c "
          import json, os
          reviewers = json.loads(os.environ['TARGET_ENV_REVIEWERS'])
          wait = int(os.environ['TARGET_ENV_WAIT_TIMER'])
          print(json.dumps({
              'wait_timer': wait,
              'reviewers': reviewers,
              'deployment_branch_policy': {
                  'protected_branches': True,
                  'custom_branch_policies': False,
              },
          }))
          ")
            resp_http=$(curl -sS --connect-timeout 10 --max-time 20 \
              -o /tmp/env.json -w '%{http_code}' \
              -X PUT "https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/${TARGET_ENV}" \
              -H "Authorization: Bearer ${GH_ADMIN_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              --data "${BODY}")
            if [ "${resp_http}" != "200" ] && [ "${resp_http}" != "201" ]; then
              echo "::error::env create failed HTTP ${resp_http}"
              head -c 800 /tmp/env.json; echo
              exit 1
            fi
            echo "PUT env '${TARGET_ENV}': HTTP ${resp_http}"
            python3 -c "
          import json
          with open('/tmp/env.json') as f:
              d = json.load(f)
          rules = d.get('protection_rules', [])
          req_reviewers = [r for r in rules if r.get('type') == 'required_reviewers']
          print(f'  name: {d.get(\"name\")}')
          print(f'  wait_timer: {d.get(\"wait_timer\", 0)}')
          print(f'  required_reviewer rules: {len(req_reviewers)}')
          print(f'  deployment_branch_policy: {d.get(\"deployment_branch_policy\")}')
          "
            rm -f /tmp/env.json
          else
            echo "::error::unexpected HTTP ${probe_http} probing env '${TARGET_ENV}'"
            head -c 800 /tmp/env_probe.json; echo
            rm -f /tmp/env_probe.json
            exit 1
          fi

      - name: Encrypt and PUT secret to target environment (idempotent)
        run: |
          set -euo pipefail
          : "${GH_ADMIN_TOKEN:?}" "${SOURCE_SECRET_VALUE:?}"

          curl -sSf --connect-timeout 10 --max-time 20 -o /tmp/pk.json \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/${TARGET_ENV}/secrets/public-key" \
            -H "Authorization: Bearer ${GH_ADMIN_TOKEN}"

          pip install --quiet --disable-pip-version-check pynacl

          python3 <<'PY'
          import json, os, urllib.request, urllib.error, base64
          from nacl.public import PublicKey, SealedBox
          from nacl.encoding import Base64Encoder

          pk = json.load(open("/tmp/pk.json"))
          public_key = PublicKey(pk["key"].encode(), Base64Encoder())
          ct = base64.b64encode(
              SealedBox(public_key).encrypt(os.environ["SOURCE_SECRET_VALUE"].encode())
          ).decode()

          body = json.dumps({"encrypted_value": ct, "key_id": pk["key_id"]}).encode()
          url = (
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}"
              f"/environments/{os.environ['TARGET_ENV']}"
              f"/secrets/{os.environ['SECRET_NAME']}"
          )
          req = urllib.request.Request(
              url, data=body, method="PUT",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_ADMIN_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"  PUT secret: HTTP {r.status} (created)")
          except urllib.error.HTTPError as e:
              if e.code == 204:
                  print("  PUT secret: HTTP 204 (updated in place)")
              else:
                  raise SystemExit(f"::error::PUT failed HTTP {e.code}: {e.read()[:400].decode()}")
          PY
          rm -f /tmp/pk.json

      - name: Verify env + secret land correctly
        # Codex P2 (2026-07-19): paginate the secrets list so an env with
        # >30 secrets doesn't yield a false "secret missing" verdict after a
        # successful PUT. Also: in the update case (TARGET_ENV_EXISTED=true)
        # we only assert that the secret is present — protection state was
        # deliberately preserved above, not overwritten, so asserting it
        # matches the inputs would be wrong.
        run: |
          set -euo pipefail
          : "${GH_ADMIN_TOKEN:?}"
          curl -sSf --connect-timeout 10 --max-time 20 -o /tmp/v_env.json \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/${TARGET_ENV}" \
            -H "Authorization: Bearer ${GH_ADMIN_TOKEN}"

          # Paginate secrets list (per_page=100, follow until we've seen all).
          : > /tmp/v_sec_names.txt
          page=1
          while :; do
            curl -sSf --connect-timeout 10 --max-time 20 -o /tmp/v_sec.json \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/environments/${TARGET_ENV}/secrets?per_page=100&page=${page}" \
              -H "Authorization: Bearer ${GH_ADMIN_TOKEN}"
            python3 -c "
          import json
          with open('/tmp/v_sec.json') as f:
              d = json.load(f)
          for s in d.get('secrets', []):
              print(s['name'])
          " >> /tmp/v_sec_names.txt
            # Check whether we've paged to the end.
            done_paging=$(python3 -c "
          import json
          with open('/tmp/v_sec.json') as f:
              d = json.load(f)
          total = d.get('total_count', 0)
          # sum names collected so far
          import subprocess
          n = int(subprocess.check_output(['wc','-l','/tmp/v_sec_names.txt']).split()[0])
          print('yes' if n >= total or not d.get('secrets') else 'no')
          ")
            [ "${done_paging}" = "yes" ] && break
            page=$((page + 1))
            [ "${page}" -gt 20 ] && { echo "::warning::verify pagination stop at page 20"; break; }
          done
          rm -f /tmp/v_sec.json

          python3 -c "
          import json, os, sys
          with open('/tmp/v_env.json') as f:
              e = json.load(f)
          with open('/tmp/v_sec_names.txt') as f:
              names = [ln.strip() for ln in f if ln.strip()]
          rules = e.get('protection_rules', [])
          req_reviewers = [r for r in rules if r.get('type') == 'required_reviewers']
          wait = e.get('wait_timer', 0)
          existed = os.environ.get('TARGET_ENV_EXISTED') == 'true'
          expected_wait = int(os.environ['TARGET_ENV_WAIT_TIMER'])
          expected_reviewers = json.loads(os.environ['TARGET_ENV_REVIEWERS'])
          secret_present = os.environ['SECRET_NAME'] in names
          if existed:
              # Preservation regime: only assert secret is present.
              ok = secret_present
              print(f'  env name:            {e.get(\"name\")}')
              print(f'  wait_timer:          {wait} (preserved — not asserted against input)')
              print(f'  required reviewers:  {len(req_reviewers)} (preserved — not asserted against input)')
              print(f'  secret present:      {secret_present}')
              print(f'  overall:             {\"OK ✓\" if ok else \"FAIL ✗\"}')
          else:
              # Create regime: assert everything matches input.
              ok = (
                  e.get('name') == os.environ['TARGET_ENV']
                  and wait == expected_wait
                  and len(req_reviewers) == (1 if expected_reviewers else 0)
                  and secret_present
              )
              print(f'  env name:            {e.get(\"name\")}')
              print(f'  wait_timer:          {wait} (expected {expected_wait})')
              print(f'  required reviewers:  {len(req_reviewers)} (expected {1 if expected_reviewers else 0})')
              print(f'  secret present:      {secret_present}')
              print(f'  overall:             {\"OK ✓\" if ok else \"FAIL ✗\"}')
          if not ok: sys.exit(1)
          "
          rm -f /tmp/v_env.json /tmp/v_sec_names.txt
          echo ""
          echo "🎉 env '${TARGET_ENV}' now carries secret '${SECRET_NAME}' — mirrored from '${{ inputs.source_env }}'."

name: Mutation Testing (Diff)

# Runs mutation testing only on lines changed in this PR.
# Much faster than full mutation testing — typically 2-5 min vs 30+ min.
#
# Requires: project must have a test runner configured (Vitest, Jest, or pytest).
# Customize the MUTATION_TOOL and test command below for your stack.

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'app/**'
      - '**/*.py'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  mutation-diff:
    name: Mutation Testing on Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          # cache: 'pnpm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile
          else
            echo "No JS lockfile found — skipping dependency install (configure your mutation tool)."
          fi

      - name: Get changed source files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|py)$' \
            | grep -v '__tests__\|\.test\.\|\.spec\.\|test_' \
            | head -20)  # cap at 20 files to limit runtime
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(printf '%s\n' "$CHANGED" | grep -c . || true)
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT

      - name: Skip if no source files changed
        if: steps.changed.outputs.count == '0'
        run: echo "No source files changed — skipping mutation testing" && exit 0


name: CI
# GitHub Actions steps legitimately mix uses/run shapes within one job.
# config-completeness-ignore: uses
# config-completeness-ignore: run
# config-completeness-ignore: id

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # hashFiles() is only valid in step-level contexts, so job gating on
  # package.json presence goes through this job's output instead.
  detect:
    name: Detect Project
    runs-on: ubuntu-latest
    outputs:
      has_pkg: ${{ steps.detect.outputs.has_pkg }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: detect
        # Lockfiles count too: a PR that deletes package.json but leaves a
        # lockfile still runs CI (and fails loudly at install) instead of
        # silently skipping the whole pipeline.
        run: echo "has_pkg=$({ [ -f package.json ] || [ -f package-lock.json ] || [ -f pnpm-lock.yaml ] || [ -f yarn.lock ] || [ -f bun.lockb ] || [ -f bun.lock ]; } && echo true || echo false)" >> "$GITHUB_OUTPUT"

  install:
    name: Install Dependencies
    if: needs.detect.outputs.has_pkg == 'true'
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          # Uncomment the appropriate cache line for your package manager:
          # cache: 'npm'
          # cache: 'pnpm'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: cache-node-modules
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci        # Replace with: pnpm install --frozen-lockfile

  # Downstream jobs skip automatically when install is skipped (via needs).
  security-audit:
    name: Security Audit
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Fallback install if cache miss
        run: test -d node_modules || npm ci
      - name: Check for known vulnerabilities
        run: npm audit --audit-level=high

  lint:
    name: Lint
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Fallback install if cache miss
        run: test -d node_modules || npm ci
      - run: npx eslint .

  typecheck:
    name: Type Check
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Fallback install if cache miss
        run: test -d node_modules || npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Fallback install if cache miss
        run: test -d node_modules || npm ci
      - run: npm test -- --coverage
      # Uncomment to upload coverage to a service (Codecov, Coveralls, etc.):
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     fail_ci_if_error: false

  build:
    name: Build
    needs: [security-audit, lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Fallback install if cache miss
        run: test -d node_modules || npm ci
      - run: npm run build

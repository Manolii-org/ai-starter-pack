name: Secret Scan

# Scans for accidentally committed secrets using Gitleaks.
# Runs on every push and PR. Blocks merge if secrets detected.
#
# Gitleaks is free for open-source projects. For private repos,
# either use the free OSS binary or add GITLEAKS_LICENSE to repo secrets.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  security-events: write  # for uploading SARIF results

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # full history needed for historical scan on push

      # Use the license-free gitleaks OSS binary (the gitleaks-action wrapper
      # requires a paid GITLEAKS_LICENSE for org repos; the CLI does not).
      - name: Install gitleaks (OSS binary)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (filesystem scan, no license required)
        run: gitleaks detect --source=. --no-git --redact --verbose

      # Optional: also run trufflehog for additional coverage
      # - name: Run TruffleHog
      #   uses: trufflesecurity/trufflehog@main
      #   with:
      #     path: ./
      #     base: ${{ github.event.repository.default_branch }}
      #     head: HEAD
      #     extra_args: --debug --only-verified

  npm-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect package.json
        id: detect
        run: |
          if [ -f package.json ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.detect.outputs.found == 'true'
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.detect.outputs.found == 'true'
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        if: steps.detect.outputs.found == 'true'
        run: npm audit --audit-level=high

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect Python dependency manifests
        id: detect
        run: |
          if ls requirements*.txt >/dev/null 2>&1 || [ -f pyproject.toml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.detect.outputs.found == 'true'
        with:
          python-version: '3.12'

      - name: Install pip-audit
        if: steps.detect.outputs.found == 'true'
        run: pip install pip-audit

      - name: Audit Python dependencies
        if: steps.detect.outputs.found == 'true'
        run: pip-audit --ignore-vuln PYSEC-2022-42969

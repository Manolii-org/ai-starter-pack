name: Mutation Testing (Diff) (Reusable)
# Reusable workflow_call form. Caller owns on: + paths-ignore via top-level.
# Cite: .github/REUSABLE-WORKFLOWS.md
#
# Runs mutation testing only on lines changed in a PR.
# Requires: project must have a test runner configured (Vitest, Jest, or pytest).

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        default: ubuntu-latest
        description: Runner label for all jobs.
      node_version:
        type: string
        default: '24'
        description: Node.js version.
      paths_ignore:
        type: string
        default: ''
        description: Newline-separated globs excluded from the internal changed-files gate.
      concurrency_group:
        type: string
        default: ''
        description: Concurrency group key.

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ inputs.concurrency_group != '' && inputs.concurrency_group || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  mutation-diff:
    name: Mutation Testing on Diff
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          # cache: 'pnpm'

      - name: Install dependencies
        run: npm ci

      - name: Get changed source files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|py)$' \
            | grep -v '__tests__\|\.test\.\|\.spec\.\|test_' \
            | head -20)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$(echo "$CHANGED" | grep -c . || echo 0)" >> $GITHUB_OUTPUT

      - name: Skip if no source files changed
        if: steps.changed.outputs.count == '0'
        run: echo "No source files changed — skipping mutation testing" && exit 0

